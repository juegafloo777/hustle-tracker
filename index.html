<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Punch In</title>
<style>
  :root {
    --ink: #12151a;
    --ink-2: #1b1f26;
    --card: #21262f;
    --line: #343b46;
    --brass: #d4a63a;
    --brass-dim: #7a642a;
    --paper: #e9e6dd;
    --paper-dim: #a8a49a;
    --green: #5c8a5c;
    --red: #b5544a;
    --radius: 4px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .header {
    text-align: center;
    padding: 18px 0 22px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 20px;
  }
  .header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--brass);
    text-transform: uppercase;
  }
  .header h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 30px;
    letter-spacing: 0.02em;
    margin: 6px 0 0;
    color: var(--paper);
  }
  .clock-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px 18px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
  }
  .clock-card::before {
    content: "";
    position: absolute;
    top: 10px; left: 10px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--brass);
    box-shadow: 20px 0 0 0 var(--brass-dim);
  }
  .clock-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--paper-dim);
    margin-bottom: 8px;
  }
  .clock-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 56px;
    font-weight: 700;
    color: var(--brass);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .clock-sub {
    font-size: 13px;
    color: var(--paper-dim);
    margin-top: 8px;
  }

  .section-title {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--brass);
    margin: 26px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--line);
  }
  .task-row:last-child { border-bottom: none; }
  .task-check {
    width: 26px; height: 26px;
    border: 2px solid var(--brass-dim);
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    background: transparent;
  }
  .task-check.done {
    background: var(--brass);
    border-color: var(--brass);
  }
  .task-check.done::after {
    content: "✓";
    color: var(--ink);
    font-weight: 700;
    font-size: 15px;
  }
  .task-label {
    flex: 1;
    font-size: 15px;
  }
  .task-label.done {
    color: var(--paper-dim);
    text-decoration: line-through;
  }
  .task-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--paper-dim);
  }

  .gauge-wrap {
    margin-top: 4px;
  }
  .gauge-numbers {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .gauge-current {
    font-family: 'JetBrains Mono', monospace;
    font-size: 30px;
    font-weight: 700;
    color: var(--brass);
  }
  .gauge-target {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--paper-dim);
  }
  .gauge-track {
    width: 100%;
    height: 14px;
    background: var(--ink-2);
    border: 1px solid var(--line);
    border-radius: 7px;
    overflow: hidden;
  }
  .gauge-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--brass-dim), var(--brass));
    transition: width 0.4s ease;
  }
  .gauge-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 12px;
    color: var(--paper-dim);
  }
  .gauge-meta strong { color: var(--paper); }

  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .add-row input {
    flex: 1;
    background: var(--ink-2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--paper);
    padding: 10px 12px;
    font-size: 15px;
    font-family: 'JetBrains Mono', monospace;
  }
  .add-row input:focus { outline: 1px solid var(--brass); }
  .add-row button {
    background: var(--brass);
    color: var(--ink);
    border: none;
    border-radius: var(--radius);
    padding: 0 18px;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.05em;
    cursor: pointer;
  }
  .add-row button:active { opacity: 0.8; }

  .log-list {
    margin-top: 10px;
    max-height: 160px;
    overflow-y: auto;
  }
  .log-item {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--line);
    color: var(--paper-dim);
  }
  .log-item strong { color: var(--brass); font-family: 'JetBrains Mono', monospace; }
  .log-item .del {
    color: var(--red);
    cursor: pointer;
    font-size: 12px;
    margin-left: 10px;
  }

  .streak-row {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .streak-dot {
    flex: 1;
    height: 34px;
    border-radius: 3px;
    background: var(--ink-2);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--paper-dim);
  }
  .streak-dot.hit {
    background: var(--brass);
    color: var(--ink);
    border-color: var(--brass);
    font-weight: 700;
  }

  .footnote {
    text-align: center;
    font-size: 11px;
    color: var(--paper-dim);
    margin-top: 30px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }

  .status-msg {
    text-align: center;
    font-size: 12px;
    color: var(--paper-dim);
    padding: 8px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="eyebrow">Daily Time Card</div>
    <h1 id="dateHeader">—</h1>
  </div>

  <div class="clock-card">
    <div class="clock-label">Days until Jan 21</div>
    <div class="clock-number" id="countdownNum">—</div>
    <div class="clock-sub" id="countdownSub">—</div>
  </div>

  <div class="section-title">Today's Punch List</div>
  <div class="card" id="taskCard">
    <div class="task-row">
      <div class="task-check" data-task="workout"></div>
      <div class="task-label" data-label="workout">Workout</div>
      <div class="task-time">45–60m</div>
    </div>
    <div class="task-row">
      <div class="task-check" data-task="study"></div>
      <div class="task-label" data-label="study">Study — tech/software support</div>
      <div class="task-time">90–120m</div>
    </div>
    <div class="task-row">
      <div class="task-check" data-task="dash"></div>
      <div class="task-label" data-label="dash">DoorDash session</div>
      <div class="task-time">~2h</div>
    </div>
    <div class="task-row">
      <div class="task-check" data-task="content"></div>
      <div class="task-label" data-label="content">Social content (film/post)</div>
      <div class="task-time">flex</div>
    </div>
  </div>

  <div class="section-title">Last 7 Days</div>
  <div class="card">
    <div class="streak-row" id="streakRow"></div>
  </div>

  <div class="section-title">Savings — $4,000 by Jan 21</div>
  <div class="card">
    <div class="gauge-wrap">
      <div class="gauge-numbers">
        <div class="gauge-current" id="savedAmount">$0</div>
        <div class="gauge-target">of $4,000</div>
      </div>
      <div class="gauge-track"><div class="gauge-fill" id="gaugeFill" style="width:0%"></div></div>
      <div class="gauge-meta">
        <span>Weekly pace needed: <strong id="weeklyPace">—</strong></span>
        <span id="pctDone">0%</span>
      </div>
    </div>
    <div class="add-row">
      <input type="number" id="addAmount" placeholder="Add amount, e.g. 25" inputmode="decimal">
      <button id="addBtn">Add</button>
    </div>
    <div class="log-list" id="logList"></div>
  </div>

  <div class="footnote">PUNCH IN · KEEP THE STREAK · JAN 21 IS THE DEADLINE</div>
</div>

<script>
const GOAL_TOTAL = 4000;
const ALREADY_SAVED_BASELINE = 132; // what was saved before this tracker started
const DEADLINE = new Date('2027-01-21T00:00:00');
const TASK_KEYS = ['workout','study','dash','content'];

function todayKey(offsetDays) {
  const d = new Date();
  d.setDate(d.getDate() + (offsetDays || 0));
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function formatDateHeader() {
  const d = new Date();
  const opts = { weekday: 'long', month: 'long', day: 'numeric' };
  document.getElementById('dateHeader').textContent = d.toLocaleDateString('en-US', opts);
}

function updateCountdown() {
  const now = new Date();
  const msLeft = DEADLINE - now;
  const daysLeft = Math.max(0, Math.ceil(msLeft / (1000*60*60*24)));
  document.getElementById('countdownNum').textContent = daysLeft;
  const weeksLeft = Math.max(1, Math.floor(daysLeft/7));
  document.getElementById('countdownSub').textContent = `≈ ${weeksLeft} weeks left`;
  return weeksLeft;
}

async function loadTasksForToday() {
  const key = 'tasks:' + todayKey();
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

async function saveTasksForToday(state) {
  const key = 'tasks:' + todayKey();
  try {
    localStorage.setItem(key, JSON.stringify(state));
  } catch (e) {
    console.error('save tasks failed', e);
  }
}

async function renderTasks() {
  const state = await loadTasksForToday();
  TASK_KEYS.forEach(t => {
    const box = document.querySelector(`.task-check[data-task="${t}"]`);
    const label = document.querySelector(`.task-label[data-label="${t}"]`);
    if (state[t]) {
      box.classList.add('done');
      label.classList.add('done');
    } else {
      box.classList.remove('done');
      label.classList.remove('done');
    }
  });
}

async function toggleTask(taskKey) {
  const state = await loadTasksForToday();
  state[taskKey] = !state[taskKey];
  await saveTasksForToday(state);
  await renderTasks();
  await renderStreak();
}

async function renderStreak() {
  const row = document.getElementById('streakRow');
  row.innerHTML = '';
  for (let i = -6; i <= 0; i++) {
    const key = todayKey(i);
    let state = {};
    try {
      const raw = localStorage.getItem('tasks:' + key);
      state = raw ? JSON.parse(raw) : {};
    } catch (e) { state = {}; }
    const doneCount = TASK_KEYS.filter(t => state[t]).length;
    const dot = document.createElement('div');
    dot.className = 'streak-dot' + (doneCount >= 2 ? ' hit' : '');
    const d = new Date(key);
    dot.textContent = d.toLocaleDateString('en-US', { weekday: 'narrow' });
    row.appendChild(dot);
  }
}

async function loadSavingsLog() {
  try {
    const raw = localStorage.getItem('savings-log');
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

async function saveSavingsLog(log) {
  try {
    localStorage.setItem('savings-log', JSON.stringify(log));
  } catch (e) {
    console.error('save savings failed', e);
  }
}

async function renderSavings() {
  const log = await loadSavingsLog();
  const totalAdded = log.reduce((sum, entry) => sum + entry.amount, 0);
  const totalSaved = ALREADY_SAVED_BASELINE + totalAdded;
  const pct = Math.min(100, (totalSaved / GOAL_TOTAL) * 100);

  document.getElementById('savedAmount').textContent = '$' + totalSaved.toLocaleString(undefined, {maximumFractionDigits: 0});
  document.getElementById('gaugeFill').style.width = pct + '%';
  document.getElementById('pctDone').textContent = Math.round(pct) + '%';

  const weeksLeft = updateCountdown();
  const remaining = Math.max(0, GOAL_TOTAL - totalSaved);
  const weeklyPace = remaining / weeksLeft;
  document.getElementById('weeklyPace').textContent = '$' + weeklyPace.toFixed(0) + '/wk';

  const listEl = document.getElementById('logList');
  listEl.innerHTML = '';
  if (log.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'status-msg';
    empty.textContent = 'No entries yet — add what you set aside each time.';
    listEl.appendChild(empty);
  } else {
    log.slice().reverse().forEach((entry, idx) => {
      const realIdx = log.length - 1 - idx;
      const item = document.createElement('div');
      item.className = 'log-item';
      const d = new Date(entry.date);
      item.innerHTML = `<span>${d.toLocaleDateString('en-US', {month:'short', day:'numeric'})}</span><span><strong>+$${entry.amount.toFixed(0)}</strong><span class="del" data-idx="${realIdx}">remove</span></span>`;
      listEl.appendChild(item);
    });
    listEl.querySelectorAll('.del').forEach(el => {
      el.addEventListener('click', async (e) => {
        const idx = parseInt(e.target.getAttribute('data-idx'));
        const currentLog = await loadSavingsLog();
        currentLog.splice(idx, 1);
        await saveSavingsLog(currentLog);
        await renderSavings();
      });
    });
  }
}

document.querySelectorAll('.task-check').forEach(box => {
  box.addEventListener('click', () => toggleTask(box.getAttribute('data-task')));
});

document.getElementById('addBtn').addEventListener('click', async () => {
  const input = document.getElementById('addAmount');
  const val = parseFloat(input.value);
  if (isNaN(val) || val <= 0) return;
  const log = await loadSavingsLog();
  log.push({ date: new Date().toISOString(), amount: val });
  await saveSavingsLog(log);
  input.value = '';
  await renderSavings();
});

document.getElementById('addAmount').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});

(async function init() {
  formatDateHeader();
  updateCountdown();
  await renderTasks();
  await renderStreak();
  await renderSavings();
})();
</script>
</body>
</html>
